<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LB Reaactor · Édition Équilibrée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease; }
        
        /* Design remplacé par des bordures fines */
        :root {
            --bg: #e0e5ec;
            --card: #e0e5ec;
            --text: #2d3748;
            --text-light: #718096;
            --accent: #3182ce;
            --btn-bg: #e0e5ec;
            --btn-text: #2d3748;
            --code-bg: #f0f4f8;
            --border-light: rgba(255,255,255,0.7);
            --border-dark: rgba(163,177,198,0.5);
            --modal-bg: rgba(224, 229, 236, 0.85);
            --modal-backdrop: rgba(0,0,0,0.4);
            --border-solid: 1px solid rgba(255,255,255,0.2);
        }
        
        body.dark {
            --bg: #13161c;
            --card: #161921;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --accent: #0ea5e9;
            --btn-bg: #1a1e27;
            --btn-text: #f8fafc;
            --code-bg: #0b0d12;
            --border-light: rgba(255,255,255,0.04);
            --border-dark: rgba(0,0,0,0.8);
            --modal-bg: rgba(22, 25, 33, 0.85);
            --modal-backdrop: rgba(0,0,0,0.8);
            --border-solid: 1px solid rgba(255,255,255,0.02);
        }

        body { 
            background: var(--bg); 
            font-family: 'Inter', system-ui, sans-serif; 
            padding: 0.75rem; 
            color: var(--text);
            min-height: 100vh;
        }

        .card {
            max-width: 1100px; 
            margin: auto; 
            background: var(--card); 
            border-radius: 1.25rem;
            padding: 1.5rem;
            border: 1px solid var(--border-dark);
            display: flex; 
            flex-direction: column; 
            gap: 1.25rem;
        }

        h1 { display: flex; justify-content: space-between; align-items: center; font-size: 1.4rem; font-weight: 700; margin: 0; }
        
        .dark-toggle { 
            background: var(--btn-bg); 
            padding: 0.4rem 1rem; 
            border-radius: 0.75rem; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.85rem; 
            color: var(--btn-text); 
            border: 1px solid var(--border-dark);
        }
        .dark-toggle:active { border-color: var(--border-light); }

        .action-bar { display: flex; gap: 1rem; justify-content: flex-end; align-items: center; }
        
        .square-btn {
            width: 44px; height: 44px;
            background: var(--btn-bg); 
            color: var(--btn-text);
            border: 1px solid var(--border-dark);
            border-radius: 0.75rem; 
            cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .square-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .square-btn:active { border-color: var(--border-light); transform: translateY(1px); }
        .btn-test-green svg { stroke: #10b981; }
        
        .code-area { display: flex; flex-direction: column; gap: 0.5rem; }
        .file-header { font-weight: 600; color: var(--text-light); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        
        input, textarea, .result, #status {
            color: var(--text) !important;
            background: var(--code-bg) !important;
            border: 1px solid var(--border-dark);
        }
        
        textarea {
            width: 100%; padding: 1rem; border-radius: 1rem;
            font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace; font-size: 0.8rem;
            resize: vertical;
        }
        #reactCode { flex-grow: 1; min-height: 140px; }
        
        #previewContainer {
            position: relative; background: var(--code-bg); border-radius: 1rem;
            margin: 0 auto; padding: 0;
            border: 1px solid var(--border-dark);
            overflow: hidden; width: 100%; max-width: 360px; aspect-ratio: 9 / 16;
            display: flex; flex-direction: column;
        }
        #previewArea {
            flex: 1; width: 100%; height: 100%;
            background: transparent;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-light);
        }
        #previewArea iframe { width: 100%; height: 100%; border: none; display: block; background: #fff; }
        
        .internal-fullscreen-btn {
            position: absolute; top: 12px; right: 12px; z-index: 10;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: white; transition: 0.2s;
        }
        .internal-fullscreen-btn svg { width: 20px; height: 20px; fill: none; stroke: white; stroke-width: 2; }
        .internal-fullscreen-btn:active { transform: scale(0.9); }
        
        #previewContainer:fullscreen {
            max-width: none !important; aspect-ratio: auto !important;
            width: 100% !important; height: 100% !important;
            border-radius: 0 !important;
        }

        .files-tools { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 0.5rem; }
        .dot-button {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: var(--btn-bg); color: var(--btn-text);
            border: 1px solid var(--border-dark);
            padding: 0.6rem 1.2rem; border-radius: 2rem; font-size: 0.8rem; font-weight: 600;
            cursor: pointer; 
        }
        .dot-button:active { border-color: var(--border-light); transform: translateY(1px); }
        .dot { width: 10px; height: 10px; border-radius: 50%; background-color: #ef4444; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.3); transition: background-color 0.2s; }
        .dot.green { background-color: #10b981; }

        .repo-line { display: flex; align-items: flex-end; gap: 1rem; margin-top: 0.5rem; }
        .repo-line .repo-field { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
        
        label { font-weight: 600; color: var(--text-light); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; margin-left: 0.2rem; }
        
        input {
            width: 100%; padding: 0 1rem; border-radius: 0.75rem;
            font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem;
            height: 46px;
            border: 1px solid var(--border-dark);
        }
        
        .token-paste-btn {
            width: 46px; height: 46px; border-radius: 0.75rem; background-color: #ef4444;
            border: 1px solid var(--border-dark);
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
            color: white; transition: all 0.2s ease;
        }
        .token-paste-btn svg { width: 22px; height: 22px; fill: none; stroke: white; stroke-width: 2.5; }
        .token-paste-btn:active { border-color: var(--border-light); transform: translateY(1px); }
        .token-paste-btn.green { 
            background-color: #10b981; 
        }

        .preview { text-align: center; margin-top: 0.5rem; }
        .preview img { max-width: 64px; border-radius: 1rem; border: 1px solid var(--border-dark); padding: 4px; background: var(--btn-bg); }
        
        .button-bar { display: flex; justify-content: center; margin-top: 0.5rem; }
        #deployBtn { 
            background: var(--accent); color: white; 
            padding: 0.8rem 2rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.3);
            font-weight: 700; font-size: 1rem; cursor: pointer; 
            transition: all 0.2s ease;
        }
        #deployBtn:active { transform: translateY(2px); border-color: rgba(255,255,255,0.6); }
        
        .result, #status {
            border-radius: 1rem; padding: 1rem; margin: 0;
            font-size: 0.85rem; font-weight: 500;
            border: 1px solid var(--border-dark);
        }
        
        .checklist { background: var(--btn-bg); border-radius: 1rem; padding: 1rem; margin: 0; border: 1px solid var(--border-dark); }
        .checklist-item { display: flex; align-items: center; gap: 0.75rem; margin: 0.5rem 0; font-size: 0.85rem; font-weight: 500; }
        
        .btn-link { 
            display: inline-block; background: var(--btn-bg); color: var(--btn-text); 
            padding: 0.6rem 1.2rem; border-radius: 0.75rem; text-decoration: none; 
            font-weight: 600; margin-top: 1rem; border: 1px solid var(--border-dark);
        }
        .btn-link:active { border-color: var(--border-light); }
        
        .footer {
            text-align: center; margin-top: 1rem;
            color: var(--text-light); font-size: 0.75rem; font-weight: 500;
            display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
        }
        .footer img { width: 64px; height: auto; opacity: 0.8; border-radius: 0.75rem; border: 1px solid var(--border-dark); }
        
        .global-exit-fullscreen {
            position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px;
            border-radius: 50%; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1); color: white;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; z-index: 99999; 
        }
        .global-exit-fullscreen svg { width: 28px; height: 28px; fill: none; stroke: white; stroke-width: 2.5; }
        
        .hidden-textarea { display: none; }
        #githubToken { display: none; }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-backdrop); backdrop-filter: blur(4px); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--modal-bg); border-radius: 1.25rem; width: 90%; max-width: 700px;
            max-height: 85vh; display: flex; flex-direction: column; padding: 1.5rem; gap: 1rem;
            border: 1px solid var(--border-dark);
        }
        .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 0.5rem; }
        .modal-actions button {
            background: var(--btn-bg); color: var(--btn-text);
            padding: 0.6rem 1.2rem; border-radius: 0.75rem; border: 1px solid var(--border-dark);
            font-weight: 600; cursor: pointer;
        }
        .modal-actions button:active { border-color: var(--border-light); }
        #modalSaveBtn { background: var(--accent); color: white; border: 1px solid rgba(255,255,255,0.3); }
        #modalSaveBtn:active { border-color: rgba(255,255,255,0.6); }
        
        @media (max-width: 640px) { 
            .card { padding: 1rem; border-radius: 1rem; }
            #previewContainer { max-width: 100%; } 
            .action-bar { justify-content: center; width: 100%; margin-top: 0.5rem; } 
        }
    </style>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4b6cb7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
<div class="card">
    <h1>⚛️ LB Reaactor <button class="dark-toggle" id="darkModeToggle">🌙 Dark</button></h1>
    <div class="action-bar">
        <button id="pasteCodeBtn" class="square-btn" title="Coller depuis le presse-papiers">
            <svg viewBox="0 0 24 24"><rect x="9" y="3" width="10" height="18" rx="2" ry="2"></rect><path d="M9 7h10M9 11h10M9 15h6M5 3h4v18H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"></path></svg>
        </button>
        <button id="runPreviewBtn" class="square-btn btn-test-green" title="Tester l'aperçu">
            <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"></polygon></svg>
        </button>
        <button id="exportHtmlBtn" class="square-btn" title="Exporter le fichier HTML complet">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </button>
    </div>
    <div class="code-area">
        <div class="file-header">📝 Code React (JSX/TSX)</div>
        <textarea id="reactCode" spellcheck="false"></textarea>
    </div>
    <div id="previewContainer">
        <button id="internalFullscreenBtn" class="internal-fullscreen-btn" title="Plein écran">
            <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        </button>
        <div id="previewArea">Aperçu</div>
    </div>
    <div class="files-tools">
        <button id="btnManifest" class="dot-button"><span class="dot" id="dotManifest"></span> manifest.json</button>
        <button id="btnSw" class="dot-button"><span class="dot" id="dotSw"></span> sw.js</button>
    </div>
    <textarea id="manifestPreview" class="hidden-textarea"></textarea>
    <textarea id="swPreview" class="hidden-textarea"></textarea>
    
    <div class="repo-line">
        <div id="tokenPasteBtn" class="token-paste-btn" title="Coller le token GitHub">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="15" r="2.5"></circle><path d="M19 10a7 7 0 0 0-14 0c0 2.5 1.5 4.5 3 6l2 2 2-2c1.5-1.5 3-3.5 3-6z"></path><line x1="12" y1="15" x2="12" y2="21"></line></svg>
        </div>
        <div class="repo-field">
            <label>📁 Nom du dépôt / PWA</label>
            <input type="text" id="repoName" value="" placeholder="Ex: mon-app">
        </div>
    </div>
    
    <div class="repo-field" style="margin-top: 0.5rem;">
        <label>🖼️ Icône de la PWA (PNG/JPG)</label>
        <input type="file" id="iconInput" accept="image/png,image/jpeg" style="padding-top: 0.6rem;">
    </div>
    <div id="previewIcon" class="preview"></div>
    
    <div class="button-bar"><button id="deployBtn">🚀 Deploy</button></div>
    <div id="checklistContainer" class="checklist" style="display:none;"></div>
    <div id="finalLinkContainer" style="text-align:center"></div>
    <div id="status" class="result">Statut : Prêt.</div>
    
    <div class="footer">
        <div>Made by Laiche Brahim 2026 Paris</div>
        <a href="https://ibb.co/svJG1ZQk" target="_blank" rel="noopener noreferrer">
            <img src="https://i.ibb.co/VWpZCsDr/dfg-1.png" alt="dfg-1" border="0">
        </a>
    </div>
</div>
<div id="globalExitFullscreen" class="global-exit-fullscreen">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
</div>
<div id="editorModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Édition</h3>
        <textarea id="modalTextarea" spellcheck="false" style="min-height: 300px;"></textarea>
        <div class="modal-actions">
            <button id="modalSaveBtn">💾 Sauvegarder</button>
            <button id="modalCancelBtn">Annuler</button>
        </div>
    </div>
</div>
<input type="password" id="githubToken" placeholder="ghp_...">

<script>
    const domElements = {
        toggleDark: document.getElementById('darkModeToggle'),
        reactCode: document.getElementById('reactCode'),
        runPreviewBtn: document.getElementById('runPreviewBtn'),
        pasteCodeBtn: document.getElementById('pasteCodeBtn'),
        exportHtmlBtn: document.getElementById('exportHtmlBtn'),
        previewArea: document.getElementById('previewArea'),
        statusDiv: document.getElementById('status'),
        manifestPreview: document.getElementById('manifestPreview'),
        swPreview: document.getElementById('swPreview'),
        deployBtn: document.getElementById('deployBtn'),
        tokenInput: document.getElementById('githubToken'),
        repoInput: document.getElementById('repoName'),
        checklistContainer: document.getElementById('checklistContainer'),
        finalLinkContainer: document.getElementById('finalLinkContainer'),
        previewContainerDiv: document.getElementById('previewContainer'),
        globalExitBtn: document.getElementById('globalExitFullscreen'),
        internalFullscreenBtn: document.getElementById('internalFullscreenBtn'),
        tokenPasteBtn: document.getElementById('tokenPasteBtn'),
        btnManifest: document.getElementById('btnManifest'),
        btnSw: document.getElementById('btnSw'),
        dotManifest: document.getElementById('dotManifest'),
        dotSw: document.getElementById('dotSw'),
        modal: document.getElementById('editorModal'),
        modalTitle: document.getElementById('modalTitle'),
        modalTextarea: document.getElementById('modalTextarea'),
        modalSaveBtn: document.getElementById('modalSaveBtn'),
        modalCancelBtn: document.getElementById('modalCancelBtn'),
        iconInput: document.getElementById('iconInput'),
        previewIcon: document.getElementById('previewIcon')
    };

    function updateThemeBtn() {
        if (domElements.toggleDark) {
            domElements.toggleDark.innerText = document.body.classList.contains('dark') ? '☀️ Light' : '🌙 Dark';
        }
    }
    if (domElements.toggleDark) {
        if (localStorage.getItem('darkMode') === null) {
            localStorage.setItem('darkMode', 'true');
            document.body.classList.add('dark');
        } else if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
        } else {
            document.body.classList.remove('dark');
        }
        updateThemeBtn();
        domElements.toggleDark.onclick = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', document.body.classList.contains('dark'));
            updateThemeBtn();
        };
    }

    let uploadedImage = null;
    let currentEditing = null;
    let currentPreviewBlobUrl = null;

    function requestFullscreen(element) {
        const req = element.requestFullscreen || element.webkitRequestFullscreen || element.mozRequestFullScreen || element.msRequestFullscreen;
        if (req) req.call(element).catch(e => console.warn(e));
    }
    function exitFullscreen() {
        const exit = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
        if (exit) exit.call(document);
    }
    function updateExitButtonVisibility() {
        if (domElements.globalExitBtn) {
            const isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
            domElements.globalExitBtn.style.display = isFullscreen ? 'flex' : 'none';
        }
    }
    document.addEventListener('fullscreenchange', updateExitButtonVisibility);
    document.addEventListener('webkitfullscreenchange', updateExitButtonVisibility);
    if (domElements.internalFullscreenBtn && domElements.previewContainerDiv) {
        domElements.internalFullscreenBtn.addEventListener('click', () => requestFullscreen(domElements.previewContainerDiv));
    }
    if (domElements.globalExitBtn) {
        domElements.globalExitBtn.addEventListener('click', exitFullscreen);
    }

    async function readClipboardText() {
        if (navigator.clipboard && navigator.clipboard.readText) {
            try { return await navigator.clipboard.readText(); } catch (err) { console.warn(err); }
        }
        const textarea = document.createElement('textarea');
        textarea.style.position = 'fixed'; textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.focus();
        document.execCommand('paste');
        const pasted = textarea.value;
        document.body.removeChild(textarea);
        if (pasted) return pasted;
        throw new Error("Impossible de lire le presse-papiers.");
    }

    async function pasteIntoReactCode() {
        try {
            const text = await readClipboardText();
            if (text && domElements.reactCode) {
                domElements.reactCode.value = text;
                showMessage("✅ Code collé.");
                generateManifestAndSW();
                localStorage.setItem('lb-reaactor-code', text);
            } else showError("Presse-papiers vide.");
        } catch (err) { showError("Accès presse-papiers impossible."); }
    }
    if (domElements.pasteCodeBtn) domElements.pasteCodeBtn.addEventListener('click', pasteIntoReactCode);

    function updateTokenButton() {
        if (domElements.tokenInput && domElements.tokenPasteBtn) {
            const token = domElements.tokenInput.value.trim();
            if (token) {
                domElements.tokenPasteBtn.classList.add('green');
                domElements.tokenPasteBtn.style.backgroundColor = '#10b981';
            } else {
                domElements.tokenPasteBtn.classList.remove('green');
                domElements.tokenPasteBtn.style.backgroundColor = '#ef4444';
            }
        }
    }
    async function pasteTokenFromClipboard() {
        try {
            const text = await readClipboardText();
            if (text && domElements.tokenInput) {
                domElements.tokenInput.value = text.trim();
                updateTokenButton();
                showMessage("✅ Token collé.");
            } else showError("Presse-papiers vide.");
        } catch (err) { showError("Accès presse-papiers impossible."); }
    }
    if (domElements.tokenPasteBtn) domElements.tokenPasteBtn.addEventListener('click', pasteTokenFromClipboard);

    let originalManifestContent = '', originalSwContent = '';
    function updateDotManifest() {
        if (domElements.dotManifest && domElements.manifestPreview)
            domElements.dotManifest.classList.toggle('green', domElements.manifestPreview.value !== originalManifestContent);
    }
    function updateDotSw() {
        if (domElements.dotSw && domElements.swPreview)
            domElements.dotSw.classList.toggle('green', domElements.swPreview.value !== originalSwContent);
    }
    function syncOriginalContents() {
        if (domElements.manifestPreview) originalManifestContent = domElements.manifestPreview.value;
        if (domElements.swPreview) originalSwContent = domElements.swPreview.value;
        updateDotManifest(); updateDotSw();
    }

    function generateManifestAndSW() {
        let appTitle = domElements.repoInput ? domElements.repoInput.value.trim() : "";
        if (!appTitle) appTitle = "ReactApp";
        let shortName = appTitle.slice(0, 12);
        let icons = [];
        if (uploadedImage) {
            const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
            icons = sizes.map(s => ({ src: 'icons/icon-' + s + '.png', sizes: s + 'x' + s, type: "image/png" }));
        }
        
        const newManifest = JSON.stringify({
            name: appTitle,
            short_name: shortName,
            start_url: "./",
            display: "standalone",
            theme_color: "#030712",
            background_color: "#030712",
            icons
        }, null, 2);

        const newSw = '// Service Worker de base pour la PWA\nself.addEventListener("fetch", (e) => {});';
        
        if (domElements.manifestPreview) domElements.manifestPreview.value = newManifest;
        if (domElements.swPreview) domElements.swPreview.value = newSw;
        
        originalManifestContent = newManifest;
        originalSwContent = newSw;
        updateDotManifest(); 
        updateDotSw();
    }

    function openModal(type) {
        currentEditing = type;
        if (domElements.modalTitle) domElements.modalTitle.innerText = type === 'manifest' ? 'Édition de manifest.json' : 'Édition de sw.js';
        if (domElements.modalTextarea) domElements.modalTextarea.value = type === 'manifest' ? domElements.manifestPreview.value : domElements.swPreview.value;
        if (domElements.modal) domElements.modal.style.display = 'flex';
    }
    function closeModal() { if (domElements.modal) domElements.modal.style.display = 'none'; currentEditing = null; }
    function saveModalContent() {
        if (currentEditing === 'manifest' && domElements.manifestPreview && domElements.modalTextarea) {
            domElements.manifestPreview.value = domElements.modalTextarea.value;
            originalManifestContent = domElements.manifestPreview.value;
        } else if (currentEditing === 'sw' && domElements.swPreview && domElements.modalTextarea) {
            domElements.swPreview.value = domElements.modalTextarea.value;
            originalSwContent = domElements.swPreview.value;
        }
        updateDotManifest(); updateDotSw();
        closeModal();
    }
    if (domElements.btnManifest) domElements.btnManifest.addEventListener('click', () => openModal('manifest'));
    if (domElements.btnSw) domElements.btnSw.addEventListener('click', () => openModal('sw'));
    if (domElements.modalSaveBtn) domElements.modalSaveBtn.addEventListener('click', saveModalContent);
    if (domElements.modalCancelBtn) domElements.modalCancelBtn.addEventListener('click', closeModal);
    if (domElements.modal) domElements.modal.addEventListener('click', (e) => { if (e.target === domElements.modal) closeModal(); });

    let babelLoaded = false;
    function ensureBabel() {
        if (typeof Babel !== 'undefined') return Promise.resolve();
        if (babelLoaded) return Promise.resolve();
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js';
            script.onload = () => { babelLoaded = true; resolve(); };
            script.onerror = () => reject(new Error("Impossible de charger Babel"));
            document.head.appendChild(script);
        });
    }

    function generateIndexHtml(rawCode) {
        let compiledCode = "";
        try {
            const result = Babel.transform(rawCode, { 
                filename: 'component.tsx', 
                presets: [
                    ['react', { runtime: 'classic' }],
                    'typescript'
                ]
            });
            compiledCode = result.code;
        } catch (err) { 
            throw new Error(err.message); 
        }

        const safeCompiled = compiledCode.replace(/<\/script>/gi, '<\\/script>');
        
        const errorScript = `
            window.addEventListener('error', function(e) {
                const root = document.getElementById('root');
                if (root) {
                    root.innerHTML = '<div style="color:#ef4444; padding:20px; font-family:monospace; background:#fee2e2; border:1px solid #f87171; border-radius:8px; margin:20px; width:calc(100% - 40px); box-sizing:border-box;"><b>❌ Erreur React :</b><br>' + e.message + '</div>';
                }
            });
        `;

        return `<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PWA Render App</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        body { margin: 0; padding: 0; background-color: #030712; font-family: system-ui; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        #root { width: 100%; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"><\/script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"><\/script>
    <script>${errorScript}<\/script>
    <script>
        if (window.React) window.React.default = window.React;
        if (window.ReactDOM) window.ReactDOM.default = window.ReactDOM;

        window.exports = {};
        window.module = { exports: window.exports };
        window.require = function(moduleName) {
            if (moduleName === 'react') return window.React;
            if (moduleName === 'react-dom' || moduleName === 'react-dom/client') return window.ReactDOM;
            return {};
        };
    <\/script>
    <script>
        try {
            ${safeCompiled}
            
            let AppComp = undefined;

            if (window.exports && window.exports.default) {
                AppComp = window.exports.default;
            } 
            else if (window.module && window.module.exports && (typeof window.module.exports === 'function' || Object.keys(window.module.exports).length > 0)) {
                AppComp = window.module.exports.default || window.module.exports;
            }

            if (!AppComp || (typeof AppComp === 'object' && Object.keys(AppComp).length === 0)) {
                if (typeof window.App === 'function') AppComp = window.App;
                else if (typeof App !== 'undefined') AppComp = App;
                else if (typeof Main !== 'undefined') AppComp = Main;
                else {
                    const globals = Object.keys(window);
                    for (let key of globals) {
                        if (/^[A-Z]/.test(key) && typeof window[key] === 'function' && key !== 'React' && key !== 'ReactDOM') {
                            AppComp = window[key];
                            break;
                        }
                    }
                }
            }

            if (AppComp) {
                const container = document.getElementById('root');
                const root = ReactDOM.createRoot(container);
                root.render(React.createElement(AppComp));
            } else {
                throw new Error("Aucun composant React principal détecté. Veuillez nommer votre composant principal 'App' ou utiliser 'export default'.");
            }
        } catch (err) {
            document.getElementById('root').innerHTML = '<div style="color:#ef4444; padding:20px; font-family:monospace; background:#fee2e2; border:1px solid #f87171; border-radius:8px; margin:20px; box-sizing:border-box;"><b>❌ Erreur d\\'exécution :</b><br>' + err.message + '</div>';
        }
    <\/script>
</body>
</html>`;
    }

    async function runInPreview() {
        const rawCode = domElements.reactCode ? domElements.reactCode.value.trim() : "";
        if (!rawCode) {
            showError("Code vide.");
            if (domElements.previewArea) domElements.previewArea.innerHTML = '<div class="error" style="color:red;padding:20px;">Code source vide</div>';
            return;
        }
        try {
            await ensureBabel();
            const html = generateIndexHtml(rawCode);
            const blob = new Blob([html], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);
            if (currentPreviewBlobUrl) URL.revokeObjectURL(currentPreviewBlobUrl);
            currentPreviewBlobUrl = blobUrl;
            if (domElements.previewArea) {
                domElements.previewArea.innerHTML = '';
                const iframe = document.createElement('iframe');
                iframe.sandbox = 'allow-scripts allow-same-origin allow-popups allow-forms';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                iframe.src = blobUrl;
                domElements.previewArea.appendChild(iframe);
            }
            showMessage("✅ Aperçu mis à jour");
        } catch (err) {
            if (domElements.previewArea) {
                domElements.previewArea.innerHTML = `<div class="error" style="color:red;padding:20px;background:#fee2e2;border-radius:8px;font-family:monospace;font-size:0.8rem;margin:10px;"><b>Erreur Compilation:</b><br>${err.message}</div>`;
            }
            showError(`Échec : ${err.message}`);
        }
    }

    function exportFullHtml() {
        const rawCode = domElements.reactCode ? domElements.reactCode.value.trim() : "";
        if (!rawCode) return showError("Code vide.");
        try {
            const html = generateIndexHtml(rawCode);
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'pwa_app.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showMessage("✅ Export HTML téléchargé.");
        } catch (err) {
            showError(`Erreur export : ${err.message}`);
        }
    }

    if (domElements.runPreviewBtn) {
        domElements.runPreviewBtn.addEventListener('click', async () => {
            await ensureBabel();
            await runInPreview();
        });
    }
    if (domElements.exportHtmlBtn) domElements.exportHtmlBtn.addEventListener('click', exportFullHtml);

    if (domElements.iconInput) {
        domElements.iconInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && (file.type === 'image/png' || file.type === 'image/jpeg')) {
                uploadedImage = file;
                const reader = new FileReader();
                reader.onload = (ev) => { if (domElements.previewIcon) domElements.previewIcon.innerHTML = `<img src="${ev.target.result}">`; };
                reader.readAsDataURL(file);
                generateManifestAndSW();
            } else if (file) {
                uploadedImage = null;
                if (domElements.previewIcon) domElements.previewIcon.innerHTML = '';
                showError("Format PNG/JPG uniquement.");
            }
        });
    }

    const savedCode = localStorage.getItem('lb-reaactor-code');
    if (savedCode !== null && domElements.reactCode) domElements.reactCode.value = savedCode;
    generateManifestAndSW();
    if (domElements.reactCode) {
        domElements.reactCode.addEventListener('input', () => {
            localStorage.setItem('lb-reaactor-code', domElements.reactCode.value);
            generateManifestAndSW();
        });
    }
    if (domElements.repoInput) domElements.repoInput.addEventListener('input', () => generateManifestAndSW());

    const ICON_SIZES = [72,96,128,144,152,192,384,512];
    function resizeToBlob(file, w, h) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                URL.revokeObjectURL(url);
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                canvas.toBlob(b => b ? resolve(b) : reject(), 'image/png');
            };
            img.onerror = reject;
            img.src = url;
        });
    }
    async function generateIcons(file) {
        const map = new Map();
        for (const size of ICON_SIZES) {
            const blob = await resizeToBlob(file, size, size);
            map.set(size, { blob, filename: `icon-${size}.png` });
        }
        return map;
    }
    async function getGitHubUser(token) {
        const res = await fetch('https://api.github.com/user', { headers: { 'Authorization': `token ${token}` } });
        if (!res.ok) {
            if (res.status === 401) throw new Error('Token invalide ou expiré (401)');
            else if (res.status === 403) throw new Error('Accès interdit (403) – vérifiez les permissions du token');
            else throw new Error(`Erreur GitHub (${res.status}): ${(await res.text())}`);
        }
        return (await res.json()).login;
    }
    async function createRepo(owner, repo, token) {
        const res = await fetch('https://api.github.com/user/repos', {
            method: 'POST', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: repo, private: false, auto_init: false })
        });
        if (!res.ok) {
            const err = await res.json();
            if (res.status === 422 && err.message.includes('already exists')) {
                throw new Error('EXISTS');
            } else if (res.status === 401) {
                throw new Error('Token invalide ou expiré (401)');
            } else {
                throw new Error(`Erreur création dépôt (${res.status}): ${err.message}`);
            }
        }
    }
    async function uploadFile(owner, repo, path, base64, token, msg) {
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
            method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg, content: base64, branch: 'main' })
        });
        if (!res.ok) {
            const err = await res.json();
            if (res.status === 409) {
                throw new Error(`Conflit (409) – le fichier ${path} existe déjà. Supprimez-le ou changez de nom.`);
            } else if (res.status === 403) {
                throw new Error(`Accès interdit (403) – vérifiez les permissions du token pour ${path}.`);
            } else {
                throw new Error(`Erreur upload ${path} (${res.status}): ${err.message}`);
            }
        }
    }
    async function enablePages(owner, repo, token) {
        const url = `https://api.github.com/repos/${owner}/${repo}/pages`;
        for (const branch of ['main', 'master']) {
            const res = await fetch(url, {
                method: 'POST', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ source: { branch, path: '/' } })
            });
            if (res.status === 201 || res.status === 204 || res.status === 409) return true;
            const err = await res.json();
            if (err.message && err.message.includes('must be one of')) continue;
            throw new Error(`Erreur activation Pages (${res.status}): ${err.message}`);
        }
        throw new Error("Impossible d'activer GitHub Pages – branches 'main' ou 'master' non trouvées.");
    }
    async function waitForSiteReady(url, maxAttempts = 35, interval = 2500) {
        for (let i = 0; i < maxAttempts; i++) {
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 5000);
                const res = await fetch(url, { method: 'GET', signal: controller.signal });
                clearTimeout(timeout);
                if (res.status === 200) return true;
            } catch(e) {}
            await new Promise(r => setTimeout(r, interval));
        }
        return false;
    }

    function updateChecklist(step, status, message = '') {
        if (!domElements.checklistContainer) return;
        domElements.checklistContainer.style.display = 'block';
        if (domElements.checklistContainer.children.length === 0) {
            const steps = ['token','icons','repo','uploadIndex','uploadManifest','uploadSw','uploadIcons','pages','wait'];
            steps.forEach(s => {
                const div = document.createElement('div');
                div.className = 'checklist-item pending';
                div.id = `check-${s}`;
                div.innerHTML = `<span class="status">⏳</span><span>${getStepLabel(s)}</span><span class="message" style="margin-left:auto; font-size:0.75rem;"></span>`;
                domElements.checklistContainer.appendChild(div);
            });
        }
        const item = document.getElementById(`check-${step}`);
        if (item) {
            item.className = `checklist-item ${status}`;
            item.querySelector('.status').textContent = status === 'success' ? '✅' : (status === 'error' ? '❌' : '⏳');
            if (message) item.querySelector('.message').textContent = message;
        }
    }
    function getStepLabel(step) {
        const labels = { token:'🔑 Vérification Token', icons:'🎨 Génération icônes', repo:'📁 Dépôt distant', uploadIndex:'📄 index.html', uploadManifest:'📄 manifest.json', uploadSw:'⚙️ sw.js', uploadIcons:'🖼️ Icônes', pages:'🌐 Activation Pages', wait:'⏳ Propagation DNS' };
        return labels[step];
    }
    function resetChecklist() { if (domElements.checklistContainer) domElements.checklistContainer.innerHTML = ''; domElements.checklistContainer.style.display = 'none'; }
    function strToBase64(str) { return btoa(unescape(encodeURIComponent(str))); }
    function blobToBase64(blob) {
        return new Promise(resolve => {
            const r = new FileReader();
            r.onloadend = () => resolve(r.result.split(',')[1]);
            r.readAsDataURL(blob);
        });
    }
    function showMessage(msg) { if (domElements.statusDiv) { domElements.statusDiv.innerHTML = msg; domElements.statusDiv.classList.remove('error'); } }
    function showError(msg) { if (domElements.statusDiv) { domElements.statusDiv.innerHTML = `❌ ${msg}`; domElements.statusDiv.classList.add('error'); } }

    if (domElements.deployBtn) {
        domElements.deployBtn.onclick = async () => {
            const token = domElements.tokenInput ? domElements.tokenInput.value.trim() : "";
            const repo = domElements.repoInput ? domElements.repoInput.value.trim() : "";
            const code = domElements.reactCode ? domElements.reactCode.value.trim() : "";
            if (!token || !repo || !code || !uploadedImage) return showError("Token, dépôt, code et icône requis.");
            domElements.deployBtn.disabled = true;
            resetChecklist();
            if (domElements.finalLinkContainer) domElements.finalLinkContainer.innerHTML = '';
            showMessage("🚀 Déploiement...");
            let siteUrl = '';
            let deploySuccess = false;
            try {
                await ensureBabel();
                updateChecklist('token','pending');
                const owner = await getGitHubUser(token);
                updateChecklist('token','success',`@${owner}`);
                updateChecklist('icons','pending');
                const iconsMap = await generateIcons(uploadedImage);
                updateChecklist('icons','success',`${iconsMap.size} icônes`);
                updateChecklist('repo','pending');
                try {
                    await createRepo(owner, repo, token);
                    updateChecklist('repo','success','créé');
                } catch(e) {
                    if (e.message === 'EXISTS') {
                        updateChecklist('repo','success','existant');
                    } else {
                        throw e;
                    }
                }
                const finalIndex = generateIndexHtml(code);
                const finalManifest = domElements.manifestPreview ? domElements.manifestPreview.value : "";
                const finalSw = domElements.swPreview ? domElements.swPreview.value : "";
                updateChecklist('uploadIndex','pending');
                await uploadFile(owner, repo, "index.html", strToBase64(finalIndex), token, "Add index");
                updateChecklist('uploadIndex','success');
                updateChecklist('uploadManifest','pending');
                await uploadFile(owner, repo, "manifest.json", strToBase64(finalManifest), token, "Add manifest");
                updateChecklist('uploadManifest','success');
                updateChecklist('uploadSw','pending');
                await uploadFile(owner, repo, "sw.js", strToBase64(finalSw), token, "Add sw");
                updateChecklist('uploadSw','success');
                updateChecklist('uploadIcons','pending');
                for (let [size, { blob, filename }] of iconsMap.entries()) {
                    const b64 = await blobToBase64(blob);
                    await uploadFile(owner, repo, `icons/${filename}`, b64, token, `Icon ${size}`);
                }
                updateChecklist('uploadIcons','success');
                updateChecklist('pages','pending');
                await enablePages(owner, repo, token);
                updateChecklist('pages','success');
                siteUrl = `https://${owner}.github.io/${repo}/`;
                deploySuccess = true;
            } catch (err) {
                showError(`Erreur : ${err.message}`);
                // Trouver la dernière étape encore en pending pour la marquer en erreur
                const pendingItems = document.querySelectorAll('.checklist-item.pending');
                if (pendingItems.length > 0) {
                    const lastPending = pendingItems[pendingItems.length - 1];
                    const step = lastPending.id.replace('check-','');
                    updateChecklist(step, 'error', err.message);
                } else {
                    // Si aucune étape en pending, on affiche dans le statut
                    showError(err.message);
                }
                domElements.deployBtn.disabled = false;
                return;
            }

            // --- BOUTON "VOIR LE SITE" même si pas encore prêt ---
            const linkContainer = domElements.finalLinkContainer;
            if (siteUrl) {
                const btn = document.createElement('button');
                btn.className = 'btn-link';
                btn.textContent = '🌐 Voir le site';
                btn.style.margin = '0.5rem';
                btn.onclick = () => window.open(siteUrl, '_blank');
                linkContainer.innerHTML = '';
                linkContainer.appendChild(btn);
                // Ajouter un message d'attente si wait n'a pas encore été exécuté ou échoué
                const waitMsg = document.createElement('div');
                waitMsg.id = 'waitMessage';
                waitMsg.style.fontSize = '0.85rem';
                waitMsg.style.marginTop = '0.5rem';
                waitMsg.style.color = 'var(--text-light)';
                waitMsg.textContent = '⏳ Attente de la mise en ligne...';
                linkContainer.appendChild(waitMsg);
            }

            // Attendre que le site soit prêt
            updateChecklist('wait','pending');
            showMessage("⏳ Attente déploiement...");
            const ready = await waitForSiteReady(siteUrl, 40, 2500);
            const waitMsgEl = document.getElementById('waitMessage');
            if (ready) {
                updateChecklist('wait','success','En ligne');
                if (waitMsgEl) waitMsgEl.textContent = '✅ Site accessible !';
                showMessage('✅ Déploiement terminé.');
            } else {
                updateChecklist('wait','error','Délai dépassé, mais le site est en cours de propagation');
                if (waitMsgEl) waitMsgEl.textContent = '⏳ Le site n\'est pas encore prêt, réessayez dans quelques minutes.';
                showMessage(`⚠️ Site pas encore prêt, mais accessible via le bouton.`);
            }
            domElements.deployBtn.disabled = false;
        };
    }

    updateTokenButton();
    syncOriginalContents();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker enregistré !'))
        .catch(err => console.error('Erreur SW :', err));
    });
  }
</script>
</body>
</html>
